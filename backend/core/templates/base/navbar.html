{% load static %}

<div class="navbar-wrapper">
  <header class="header-wrapper">

    <!-- Overlay buscador -->
    
<div id="buscador-overlay" class="buscador-overlay">
  <div class="buscador-content">

    <!-- Cerrar -->
    <button class="close-search" onclick="ocultarBuscador()" aria-label="Cerrar buscador">
      <i class="fas fa-times"></i>
    </button>

    <!-- Input -->
    <div class="buscador-input-wrapper">
      <i class="fas fa-search buscador-search-icon"></i>
      <input
        type="text"
        id="buscador-input"
        placeholder="Busca una ruta... ej: El Morro, Cascada..."
        autocomplete="off"
      />
    </div>

    <!-- Resultados (llenados por JS) -->
    <div id="buscador-resultados" class="buscador-resultados"></div>

  </div>
</div>





    <!-- NAVBAR -->
    <nav class="main-nav">
      <!-- Brand -->
      <div class="nav-brand">
        <img src="{% static 'base/images/logo.jpg' %}" alt="Walk App Logo" class="nav-logo"/>
        <h1 class="nav-title">Walk App</h1>
      </div>

      <!-- Links de navegación -->
      <ul class="nav-links" id="nav-links">
        <li><a href="{% url 'home' %}">Inicio</a></li>
        <li><a href="{% url 'comunidad' %}">Comunidad</a></li>
        <li><a href="{% url 'juegos' %}">Juegos</a></li>
        <li><a href="{% url 'rutas' %}">Rutas</a></li>
        <li><a href="{% url 'ranking' %}">Ranking</a></li>
        {% if user.is_authenticated and user.is_superuser %}
          <li><a href="{% url 'users:admin_dashboard' %}">Panel Admin</a></li>
        {% endif %}
      </ul>

      <!-- Acciones -->
      <div class="nav-actions">
        <button class="nav-icon-button" onclick="mostrarBuscador()" aria-label="Buscar">
          <i class="fas fa-search"></i>
        </button>

        {% if user.is_authenticated %}
          <a href="{% url 'users:perfil_usuario' %}" class="btn-profile-icon" aria-label="Perfil de usuario">
            <i class="fas fa-user-circle"></i>
          </a>
          <form action="{% url 'users:logout' %}" method="post" style="display:inline;">
            {% csrf_token %}
            <button class="cerrar" type="submit">Cerrar</button>
          </form>
        {% else %}
          <a href="{% url 'users:registro' %}" class="btn-login">Registrarse</a>
          <a href="{% url 'users:login' %}" class="btn-login">Iniciar Sesión</a>
        {% endif %}

        <!-- Hamburguesa -->
        <button class="hamburger" id="hamburger-btn" aria-label="Abrir menú" aria-expanded="false">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </nav>

    <!-- Overlay oscuro para cerrar menú al tocar fuera -->
    <div class="nav-overlay" id="nav-overlay"></div>
  </header>
</div>
