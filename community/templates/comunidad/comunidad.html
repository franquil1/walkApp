<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comunidad</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #e8c547;
    --accent2: #f08a5d;
    --text: #e8e8f0;
    --muted: #7a7a9a;
    --success: #4ecdc4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,13,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo span {
    font-weight: 400;
    font-style: italic;
  }

  nav {
    display: flex;
    gap: 0.25rem;
    align-items: center;
  }

  nav button {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 0.4rem 0.8rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  nav button:hover, nav button.active {
    color: var(--text);
    background: var(--surface2);
  }

  nav button.active {
    color: var(--accent);
  }

  .header-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
    color: #000;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.2s;
  }

  .header-avatar:hover { border-color: var(--accent); }

  /* LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 240px 1fr 280px;
    gap: 0;
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1rem;
    gap: 2rem;
  }

  /* SIDEBAR LEFT */
  .sidebar-left {
    position: sticky;
    top: 80px;
    height: fit-content;
  }

  .sidebar-section {
    margin-bottom: 2rem;
  }

  .sidebar-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
    padding-left: 0.5rem;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.55rem 0.75rem;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 500;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .sidebar-item:hover { background: var(--surface2); color: var(--text); }
  .sidebar-item.active { background: var(--surface2); color: var(--accent); }

  .sidebar-item .icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    background: var(--surface);
    flex-shrink: 0;
  }

  .sidebar-item.active .icon { background: rgba(232,197,71,0.15); }

  .badge {
    margin-left: auto;
    background: var(--accent);
    color: #000;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 99px;
  }

  /* MAIN FEED */
  .feed { display: flex; flex-direction: column; gap: 1.25rem; }

  /* COMPOSER */
  .composer {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem;
    transition: border-color 0.3s;
  }

  .composer:focus-within { border-color: rgba(232,197,71,0.4); }

  .composer-top {
    display: flex;
    gap: 0.75rem;
    align-items: flex-start;
  }

  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6c63ff, var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
    color: #fff;
    flex-shrink: 0;
  }

  .composer-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    resize: none;
    min-height: 80px;
    transition: border-color 0.2s;
    outline: none;
  }

  .composer-input:focus { border-color: rgba(232,197,71,0.4); }
  .composer-input::placeholder { color: var(--muted); }

  .composer-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 1rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
  }

  .media-btns {
    display: flex;
    gap: 0.25rem;
  }

  .media-btn {
    background: none;
    border: none;
    color: var(--muted);
    padding: 0.5rem 0.65rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 0.4rem;
    font-family: 'DM Sans', sans-serif;
  }

  .media-btn span { font-size: 0.8rem; font-weight: 500; }
  .media-btn:hover { background: var(--surface2); color: var(--text); }

  .publish-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    border: none;
    padding: 0.5rem 1.25rem;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .publish-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .publish-btn:active { transform: translateY(0); }

  /* IMAGE PREVIEW */
  .image-preview {
    display: none;
    margin-top: 0.75rem;
    border-radius: 10px;
    overflow: hidden;
    border: 1px dashed var(--border);
    position: relative;
  }

  .image-preview.show { display: block; }

  .image-preview img {
    width: 100%;
    max-height: 300px;
    object-fit: cover;
    display: block;
  }

  .remove-img {
    position: absolute;
    top: 0.5rem; right: 0.5rem;
    background: rgba(0,0,0,0.7);
    color: var(--text);
    border: none;
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center;
  }

  /* POST CARD */
  .post {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.2s;
    animation: fadeUp 0.4s ease both;
  }

  .post:hover { border-color: rgba(232,197,71,0.2); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .post-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 1.25rem;
  }

  .post-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem;
    flex-shrink: 0;
  }

  .post-meta { flex: 1; }
  .post-name { font-weight: 600; font-size: 0.95rem; }
  .post-time { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }

  .post-menu {
    background: none; border: none; color: var(--muted);
    font-size: 1.2rem; cursor: pointer; padding: 0.3rem;
    border-radius: 6px; transition: background 0.2s;
  }
  .post-menu:hover { background: var(--surface2); color: var(--text); }

  .post-body { padding: 0 1.25rem 0.75rem; }
  .post-body p { font-size: 0.95rem; line-height: 1.65; color: #c8c8de; }

  .post-image {
    width: 100%;
    max-height: 420px;
    object-fit: cover;
    display: block;
    margin: 0.5rem 0;
  }

  .post-tags {
    display: flex; flex-wrap: wrap; gap: 0.4rem;
    padding: 0 1.25rem 0.75rem;
  }

  .tag {
    font-size: 0.78rem;
    color: var(--accent);
    background: rgba(232,197,71,0.1);
    padding: 3px 10px;
    border-radius: 99px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .tag:hover { background: rgba(232,197,71,0.2); }

  .post-actions {
    display: flex;
    align-items: center;
    padding: 0.5rem 1rem;
    border-top: 1px solid var(--border);
    gap: 0.25rem;
  }

  .action-btn {
    display: flex; align-items: center; gap: 0.45rem;
    background: none; border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 0.5rem 0.75rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .action-btn:hover { background: var(--surface2); color: var(--text); }
  .action-btn.liked { color: #e74c6d; }
  .action-btn.liked:hover { color: #e74c6d; background: rgba(231,76,109,0.1); }
  .action-btn.saved { color: var(--accent); }

  .action-btn svg { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .action-btn.liked svg { fill: #e74c6d; }

  .action-btn .count { font-size: 0.82rem; }

  .share-btn { margin-left: auto; }

  /* COMMENTS */
  .comments-section {
    border-top: 1px solid var(--border);
    padding: 0.75rem 1.25rem;
    display: none;
  }

  .comments-section.open { display: block; }

  .comment {
    display: flex; gap: 0.65rem;
    margin-bottom: 0.75rem;
    animation: fadeUp 0.25s ease;
  }

  .comment-av {
    width: 30px; height: 30px;
    border-radius: 50%;
    font-size: 0.7rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .comment-bubble {
    background: var(--surface2);
    border-radius: 10px;
    padding: 0.5rem 0.75rem;
    flex: 1;
  }

  .comment-bubble .cname { font-size: 0.8rem; font-weight: 600; margin-bottom: 2px; }
  .comment-bubble .ctext { font-size: 0.85rem; color: #b0b0cc; line-height: 1.5; }

  .comment-input-row {
    display: flex; gap: 0.65rem; align-items: center;
    margin-top: 0.75rem;
  }

  .comment-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.45rem 0.75rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .comment-input:focus { border-color: rgba(232,197,71,0.35); }
  .comment-input::placeholder { color: var(--muted); }

  .comment-send {
    background: var(--accent);
    color: #000;
    border: none;
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s;
    flex-shrink: 0;
  }
  .comment-send:hover { opacity: 0.85; }

  /* SIDEBAR RIGHT */
  .sidebar-right {
    position: sticky;
    top: 80px;
    height: fit-content;
  }

  .widget {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }

  .widget-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 1rem;
    color: var(--text);
  }

  .trending-item {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .trending-item:last-child { border-bottom: none; }
  .trending-item:hover { opacity: 0.75; }

  .trending-num {
    font-size: 1.4rem;
    font-weight: 900;
    font-family: 'Playfair Display', serif;
    color: var(--border);
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }

  .trending-info .t-tag { font-size: 0.82rem; font-weight: 600; color: var(--accent); }
  .trending-info .t-count { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }

  .member {
    display: flex; align-items: center; gap: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .member-av {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 700;
    flex-shrink: 0;
  }

  .member-info { flex: 1; }
  .member-name { font-size: 0.85rem; font-weight: 600; }
  .member-role { font-size: 0.73rem; color: var(--muted); }

  .follow-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.3rem 0.7rem;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .follow-btn:hover { border-color: var(--accent); color: var(--accent); }
  .follow-btn.following { background: rgba(232,197,71,0.1); border-color: var(--accent); color: var(--accent); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 2rem; right: 2rem;
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 0.75rem 1.25rem;
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 500;
    z-index: 9000;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex; align-items: center; gap: 0.5rem;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* TABS */
  .feed-tabs {
    display: flex;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.3rem;
  }

  .feed-tab {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 0.45rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .feed-tab.active { background: var(--surface2); color: var(--accent); }

  /* HIDDEN FILE INPUT */
  #fileInput { display: none; }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar-left, .sidebar-right { display: none; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Com<span>unidad</span></div>
  <nav>
    <button class="active">Inicio</button>
    <button>Explorar</button>
    <button>Eventos</button>
    <button>Mensajes</button>
  </nav>
  <div class="header-avatar">TÚ</div>
</header>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR LEFT -->
  <aside class="sidebar-left">
    <div class="sidebar-section">
      <div class="sidebar-label">Menú</div>
      <button class="sidebar-item active">
        <span class="icon">🏠</span> Inicio
      </button>
      <button class="sidebar-item">
        <span class="icon">🔥</span> Tendencias
        <span class="badge">12</span>
      </button>
      <button class="sidebar-item">
        <span class="icon">📷</span> Galería
      </button>
      <button class="sidebar-item">
        <span class="icon">🔔</span> Notificaciones
        <span class="badge">3</span>
      </button>
      <button class="sidebar-item">
        <span class="icon">🔖</span> Guardados
      </button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Mis grupos</div>
      <button class="sidebar-item">
        <span class="icon">🎨</span> Diseño
      </button>
      <button class="sidebar-item">
        <span class="icon">💻</span> Tecnología
      </button>
      <button class="sidebar-item">
        <span class="icon">🌿</span> Naturaleza
      </button>
    </div>
  </aside>

  <!-- FEED -->
  <main>
    <div class="feed">

      <!-- TABS -->
      <div class="feed-tabs">
        <button class="feed-tab active">Para ti</button>
        <button class="feed-tab">Siguiendo</button>
        <button class="feed-tab">Reciente</button>
      </div>

      <!-- COMPOSER -->
      <div class="composer">
        <div class="composer-top">
          <div class="avatar">TÚ</div>
          <textarea class="composer-input" id="composerText" placeholder="¿Qué quieres compartir hoy con la comunidad?"></textarea>
        </div>
        <div class="image-preview" id="imgPreview">
          <img id="previewImg" src="" alt="Vista previa">
          <button class="remove-img" onclick="removeImage()">✕</button>
        </div>
        <div class="composer-actions">
          <div class="media-btns">
            <label class="media-btn" for="fileInput" title="Imagen">
              📷 <span>Foto</span>
            </label>
            <input type="file" id="fileInput" accept="image/*" onchange="handleImage(event)">
            <button class="media-btn" title="GIF">🎞 <span>GIF</span></button>
            <button class="media-btn" title="Etiqueta">🏷 <span>Etiqueta</span></button>
            <button class="media-btn" title="Encuesta">📊 <span>Encuesta</span></button>
          </div>
          <button class="publish-btn" onclick="publishPost()">Publicar →</button>
        </div>
      </div>

      <!-- POSTS (dinámicos) -->
      <div id="postsContainer"></div>

    </div>
  </main>

  <!-- SIDEBAR RIGHT -->
  <aside class="sidebar-right">

    <!-- Trending -->
    <div class="widget">
      <div class="widget-title">Tendencias 🔥</div>
      <div class="trending-item">
        <div class="trending-num">1</div>
        <div class="trending-info">
          <div class="t-tag">#DiseñoCreativo</div>
          <div class="t-count">1.2k publicaciones</div>
        </div>
      </div>
      <div class="trending-item">
        <div class="trending-num">2</div>
        <div class="trending-info">
          <div class="t-tag">#TecnologíaIA</div>
          <div class="t-count">876 publicaciones</div>
        </div>
      </div>
      <div class="trending-item">
        <div class="trending-num">3</div>
        <div class="trending-info">
          <div class="t-tag">#Fotografía</div>
          <div class="t-count">654 publicaciones</div>
        </div>
      </div>
      <div class="trending-item">
        <div class="trending-num">4</div>
        <div class="trending-info">
          <div class="t-tag">#Naturaleza</div>
          <div class="t-count">430 publicaciones</div>
        </div>
      </div>
    </div>

    <!-- Miembros sugeridos -->
    <div class="widget">
      <div class="widget-title">Conoce miembros</div>
      <div class="member">
        <div class="member-av" style="background: linear-gradient(135deg, #6c63ff, #e74c6d);">MR</div>
        <div class="member-info">
          <div class="member-name">María Rodríguez</div>
          <div class="member-role">Diseñadora UI/UX</div>
        </div>
        <button class="follow-btn" onclick="toggleFollow(this)">Seguir</button>
      </div>
      <div class="member">
        <div class="member-av" style="background: linear-gradient(135deg, #4ecdc4, #44a08d);">CL</div>
        <div class="member-info">
          <div class="member-name">Carlos López</div>
          <div class="member-role">Fotógrafo</div>
        </div>
        <button class="follow-btn" onclick="toggleFollow(this)">Seguir</button>
      </div>
      <div class="member">
        <div class="member-av" style="background: linear-gradient(135deg, #f08a5d, #e8c547);">AP</div>
        <div class="member-info">
          <div class="member-name">Ana Pérez</div>
          <div class="member-role">Desarrolladora</div>
        </div>
        <button class="follow-btn" onclick="toggleFollow(this)">Seguir</button>
      </div>
    </div>
  </aside>

</div>

<!-- TOAST -->
<div class="toast" id="toast">✓ <span id="toastMsg"></span></div>

<script>
  // ─── DATA ───────────────────────────────────────────────────
  const COLORS = [
    'linear-gradient(135deg,#6c63ff,#e74c6d)',
    'linear-gradient(135deg,#4ecdc4,#44a08d)',
    'linear-gradient(135deg,#f08a5d,#e8c547)',
    'linear-gradient(135deg,#a18cd1,#fbc2eb)',
    'linear-gradient(135deg,#fd7043,#e91e63)',
    'linear-gradient(135deg,#00bcd4,#3f51b5)',
  ];

  let posts = [
    {
      id: 1,
      name: 'Laura Sánchez',
      initials: 'LS',
      color: COLORS[0],
      time: 'hace 15 min',
      text: '¡Acabo de terminar mi nuevo proyecto de identidad visual para una startup de tecnología! Semanas de trabajo condensadas en un sistema de diseño limpio y escalable. 🎨',
      image: 'https://images.unsplash.com/photo-1561070791-2526d30994b5?w=700&q=80',
      tags: ['#Diseño', '#Branding', '#UI'],
      likes: 48, liked: false,
      comments: [
        { name: 'Pedro G.', initials: 'PG', color: COLORS[3], text: '¡Increíble trabajo! El sistema de colores está muy logrado.' }
      ],
      saved: false,
      showComments: false,
    },
    {
      id: 2,
      name: 'Andrés Torres',
      initials: 'AT',
      color: COLORS[1],
      time: 'hace 1 hora',
      text: 'El amanecer de hoy fue simplemente mágico. A veces la naturaleza nos recuerda que la mejor fotografía no necesita edición. 🌅',
      image: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=700&q=80',
      tags: ['#Fotografía', '#Naturaleza', '#Amanecer'],
      likes: 127, liked: false,
      comments: [
        { name: 'Sara M.', initials: 'SM', color: COLORS[2], text: '¡Qué foto tan hermosa! ¿Dónde fue tomada?' },
        { name: 'Luis R.', initials: 'LR', color: COLORS[5], text: 'Los colores son increíbles, parece un cuadro.' }
      ],
      saved: false,
      showComments: false,
    },
    {
      id: 3,
      name: 'Sofía Méndez',
      initials: 'SM',
      color: COLORS[2],
      time: 'hace 3 horas',
      text: 'Reflexión del día: la comunidad más valiosa no es la más grande, sino la más genuina. Gracias a todos los que hacen de este espacio algo especial. 💛',
      image: null,
      tags: ['#Comunidad', '#Reflexión'],
      likes: 89, liked: false,
      comments: [],
      saved: false,
      showComments: false,
    }
  ];

  let nextId = 4;
  let selectedImage = null;

  // ─── RENDER ──────────────────────────────────────────────────
  function renderPosts() {
    const container = document.getElementById('postsContainer');
    container.innerHTML = posts.map(p => renderPost(p)).join('');
  }

  function renderPost(p) {
    const imageHtml = p.image
      ? `<img class="post-image" src="${p.image}" alt="Post image">`
      : '';

    const tagsHtml = p.tags.map(t => `<span class="tag">${t}</span>`).join('');

    const commentsHtml = p.comments.map(c => `
      <div class="comment">
        <div class="comment-av" style="background:${c.color}">${c.initials}</div>
        <div class="comment-bubble">
          <div class="cname">${c.name}</div>
          <div class="ctext">${c.text}</div>
        </div>
      </div>
    `).join('');

    return `
      <div class="post" id="post-${p.id}">
        <div class="post-header">
          <div class="post-avatar" style="background:${p.color}">${p.initials}</div>
          <div class="post-meta">
            <div class="post-name">${p.name}</div>
            <div class="post-time">${p.time}</div>
          </div>
          <button class="post-menu" onclick="showToast('Opciones del post')">⋯</button>
        </div>
        <div class="post-body">
          <p>${p.text}</p>
        </div>
        ${imageHtml}
        <div class="post-tags">${tagsHtml}</div>
        <div class="post-actions">
          <button class="action-btn ${p.liked ? 'liked' : ''}" onclick="toggleLike(${p.id})">
            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <span class="count">${p.likes}</span>
          </button>
          <button class="action-btn" onclick="toggleComments(${p.id})">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span class="count">${p.comments.length}</span>
          </button>
          <button class="action-btn" onclick="showToast('¡Compartido!')">
            <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
            Compartir
          </button>
          <button class="action-btn share-btn ${p.saved ? 'saved' : ''}" onclick="toggleSave(${p.id})">
            <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          </button>
        </div>
        <div class="comments-section ${p.showComments ? 'open' : ''}" id="comments-${p.id}">
          ${commentsHtml}
          <div class="comment-input-row">
            <div class="comment-av" style="background:linear-gradient(135deg,#6c63ff,var(--accent2));width:30px;height:30px;border-radius:50%;font-size:0.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;">TÚ</div>
            <input class="comment-input" id="ci-${p.id}" placeholder="Escribe un comentario..." onkeydown="if(event.key==='Enter') addComment(${p.id})">
            <button class="comment-send" onclick="addComment(${p.id})">↑</button>
          </div>
        </div>
      </div>
    `;
  }

  // ─── ACTIONS ─────────────────────────────────────────────────
  function toggleLike(id) {
    const p = posts.find(x => x.id === id);
    p.liked = !p.liked;
    p.likes += p.liked ? 1 : -1;
    if (p.liked) showToast('¡Te gustó esta publicación! ❤️');
    renderPosts();
  }

  function toggleComments(id) {
    const p = posts.find(x => x.id === id);
    p.showComments = !p.showComments;
    renderPosts();
    if (p.showComments) {
      setTimeout(() => document.getElementById(`ci-${id}`)?.focus(), 100);
    }
  }

  function addComment(id) {
    const input = document.getElementById(`ci-${id}`);
    const text = input.value.trim();
    if (!text) return;
    const p = posts.find(x => x.id === id);
    const names = ['Tu comentario', 'Tú'];
    p.comments.push({ name: 'Tú', initials: 'TÚ', color: 'linear-gradient(135deg,#6c63ff,var(--accent2))', text });
    input.value = '';
    renderPosts();
    showToast('Comentario publicado ✓');
  }

  function toggleSave(id) {
    const p = posts.find(x => x.id === id);
    p.saved = !p.saved;
    showToast(p.saved ? 'Guardado en tu colección 🔖' : 'Eliminado de guardados');
    renderPosts();
  }

  function handleImage(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      selectedImage = ev.target.result;
      document.getElementById('previewImg').src = selectedImage;
      document.getElementById('imgPreview').classList.add('show');
    };
    reader.readAsDataURL(file);
  }

  function removeImage() {
    selectedImage = null;
    document.getElementById('imgPreview').classList.remove('show');
    document.getElementById('fileInput').value = '';
  }

  function publishPost() {
    const text = document.getElementById('composerText').value.trim();
    if (!text && !selectedImage) {
      showToast('Escribe algo o añade una imagen 📝');
      return;
    }

    // Extract tags
    const tags = (text.match(/#\w+/g) || []).slice(0, 3);
    const clean = text || '📷';

    const colorIdx = nextId % COLORS.length;
    const newPost = {
      id: nextId++,
      name: 'Tú',
      initials: 'TÚ',
      color: 'linear-gradient(135deg,#6c63ff,#e74c6d)',
      time: 'justo ahora',
      text: clean,
      image: selectedImage,
      tags: tags.length ? tags : ['#Comunidad'],
      likes: 0, liked: false,
      comments: [],
      saved: false,
      showComments: false,
    };

    posts.unshift(newPost);
    document.getElementById('composerText').value = '';
    removeImage();
    renderPosts();
    showToast('¡Publicación compartida con la comunidad! 🎉');
    window.scrollTo({ top: 200, behavior: 'smooth' });
  }

  function toggleFollow(btn) {
    const following = btn.classList.toggle('following');
    btn.textContent = following ? 'Siguiendo' : 'Seguir';
    showToast(following ? '¡Ahora sigues a este miembro!' : 'Dejaste de seguir');
  }

  // ─── TOAST ───────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ─── TABS ────────────────────────────────────────────────────
  document.querySelectorAll('.feed-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.feed-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      showToast(`Vista: ${btn.textContent}`);
    });
  });

  document.querySelectorAll('nav button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  document.querySelectorAll('.sidebar-item').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // ─── INIT ────────────────────────────────────────────────────
  renderPosts();
</script>
</body>
</html>
