{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="{% static 'base/css/navbar.css' %}">
  <link rel="stylesheet" href="{% static 'base/css/footer.css' %}">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" />
  
  <link rel="icon" href="{% static 'base/images/logo.jpg' %}" type="image/x-icon">

  <title>{% block title %}Walk App{% endblock %}</title>
  {% block extra_css %}{% endblock %}
</head>

<script src="{% static 'js/buscador.js' %}"></script>
<body>

  <!-- ================= NAVBAR ENCAPSULADO ================= -->
  <div class="navbar-wrapper">
    {% include 'base/navbar.html' %}
  </div>
    <div class="navbar-space"></div>
  <!-- ================= CONTENIDO DE LA PÁGINA ================= -->
  <main class="main-wrapper">
    {% block content %}
    {% endblock %}
  </main>

  <!-- ================= JS GLOBAL ================= -->
  <script src="{% static '/base/javascripts/menu.js' %}"></script>
  <script src="{% static '/home/javascripts/home.js' %}"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
  
  <!-- ================= FOOTER ================= -->
  {% include 'base/footer.html' %}
</body>
</html>
